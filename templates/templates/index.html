<!DOCTYPE html>
<html>
<head>
    <title>PRO Trading Bot</title>
    <meta http-equiv="refresh" content="10">
</head>
<body style="background:#0f172a;color:white;text-align:center;">

<h1>📊 PRO Trading Dashboard</h1>

{% for s in signals %}
<div style="margin:15px;padding:20px;background:#1e293b;border-radius:10px;">
    <h2>{{ s.symbol }}</h2>
    <p>Preço: {{ s.price }}</p>

    {% if s.signal == "BUY" %}
        <h2 style="color:lime;">🟢 BUY</h2>
    {% elif s.signal == "SELL" %}
        <h2 style="color:red;">🔴 SELL</h2>
    {% else %}
        <h2 style="color:gray;">⚪ NO SIGNAL</h2>
    {% endif %}
</div>
{% endfor %}

</body>
</html>
