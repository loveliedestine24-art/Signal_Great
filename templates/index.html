<!DOCTYPE html>
<html>
<head>
    <title>Trading Bot Dashboard</title>
    <meta http-equiv="refresh" content="10">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>📊 Trading Bot Dashboard</h1>

<div class="container">

{% for s in signals %}
<div class="card">
    <h2>{{ s.symbol }}</h2>
    <p>Preço: {{ s.price }}</p>

    {% if s.signal == "BUY" %}
        <p class="buy">🟢 BUY</p>
    {% elif s.signal == "SELL" %}
        <p class="sell">🔴 SELL</p>
    {% else %}
        <p class="neutral">⚪ NO SIGNAL</p>
    {% endif %}

    <p>RSI: {{ s.rsi }}</p>
</div>
{% endfor %}

</div>

</body>
</html>
